services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

    # FIX: proper healthcheck (no curl dependency)
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/uploads
      - ./chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rag_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hf_cache: